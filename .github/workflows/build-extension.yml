name: Build Extension

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to VS Code Marketplace"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Type-check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build production bundle
        run: npm run build

      - name: Get version from package.json
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package extension (.vsix)
        run: npx @vscode/vsce package --no-dependencies -o clipster-${{ steps.pkg.outputs.version }}.vsix

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@v4
        with:
          name: clipster-${{ steps.pkg.outputs.version }}
          path: clipster-${{ steps.pkg.outputs.version }}.vsix
          retention-days: 30

      - name: Attach .vsix to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: clipster-${{ steps.pkg.outputs.version }}.vsix

      - name: Publish to VS Code Marketplace
        if: >
          startsWith(github.ref, 'refs/tags/') ||
          github.event.inputs.publish == 'true'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --no-dependencies --pat "$VSCE_PAT"
